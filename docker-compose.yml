services:
  klarki-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: klarki-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - DEBUG=${DEBUG:-false}
      - OLLAMA_HOST=http://klarki-ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi3:mini}
      - CHROMADB_HOST=http://klarki-chromadb:8000
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-intfloat/multilingual-e5-small}
      - UPLOAD_MAX_SIZE_MB=${UPLOAD_MAX_SIZE_MB:-10}
      - UPLOAD_DIR=/data/uploads
      - USE_TRITON=${USE_TRITON:-false}
      - TRITON_HOST=${TRITON_HOST:-klarki-triton}
      - TRITON_GRPC_PORT=${TRITON_GRPC_PORT:-8001}
      - USE_OPENSEARCH=${USE_OPENSEARCH:-false}
      - OPENSEARCH_HOST=klarki-opensearch
      - OPENSEARCH_PORT=${OPENSEARCH_PORT:-9200}
    volumes:
      - upload_data:/data/uploads
      - chroma_data:/data/chroma
    depends_on:
      klarki-chromadb:
        condition: service_healthy
      klarki-ollama:
        condition: service_started
    networks:
      - klarki-net
    restart: unless-stopped

  klarki-chromadb:
    image: chromadb/chroma:latest
    container_name: klarki-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/data   # chromadb/chroma stores data in /data by default
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - PERSIST_DIRECTORY=/data
    healthcheck:
      # chromadb/chroma has no curl/python in PATH — use bash /dev/tcp instead
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - klarki-net
    restart: unless-stopped

  klarki-ollama:
    image: ollama/ollama:latest
    container_name: klarki-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # GPU layer count — used only when NVIDIA GPU is present (ignored otherwise).
      # phi3:mini has 32 layers; offloading 20 stays within 4 GB VRAM on RTX 3050 Ti.
      - OLLAMA_GPU_LAYERS=20
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_CTX=2048
    # GPU acceleration is opt-in via docker-compose.gpu.yml overlay:
    #   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
    # ./run.sh up and ./run.sh setup auto-apply the overlay when nvidia-smi is detected.
    networks:
      - klarki-net
    restart: unless-stopped

  klarki-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: klarki-frontend
    ports:
      - "80:80"
    depends_on:
      - klarki-api
    networks:
      - klarki-net
    restart: unless-stopped

  klarki-opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: klarki-opensearch
    profiles:
      - opensearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - klarki-net
    restart: unless-stopped

  klarki-training:
    build:
      context: .
      dockerfile: training/Dockerfile
    container_name: klarki-training
    profiles:
      - training
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - OLLAMA_HOST=http://klarki-ollama:11434
      - CHROMADB_HOST=http://klarki-chromadb:8000
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
    depends_on:
      klarki-chromadb:
        condition: service_healthy
      klarki-ollama:
        condition: service_started
    networks:
      - klarki-net

  klarki-triton:
    build:
      context: .
      dockerfile: Dockerfile.triton
    container_name: klarki-triton
    profiles:
      - triton
    ports:
      - "8002:8000"
      - "8003:8001"
      - "8004:8002"
    volumes:
      - ./model_repository:/models
      - ./training/artifacts/spacy_ner_model:/spacy_model
    environment:
      - SPACY_MODEL_PATH=/spacy_model/model-final
    command: tritonserver --model-repository=/models --exit-on-error=false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - klarki-net
    restart: unless-stopped

volumes:
  upload_data:
  chroma_data:
  ollama_data:
  opensearch_data:

networks:
  klarki-net:
    driver: bridge
