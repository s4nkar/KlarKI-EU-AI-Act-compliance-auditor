services:
  klarki-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: klarki-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - DEBUG=${DEBUG:-false}
      - OLLAMA_HOST=http://klarki-ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi3:mini}
      - CHROMADB_HOST=http://klarki-chromadb:8000
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-intfloat/multilingual-e5-small}
      - UPLOAD_MAX_SIZE_MB=${UPLOAD_MAX_SIZE_MB:-10}
      - UPLOAD_DIR=/data/uploads
      - USE_TRITON=${USE_TRITON:-false}
      - TRITON_HOST=${TRITON_HOST:-klarki-triton}
      - TRITON_GRPC_PORT=${TRITON_GRPC_PORT:-8001}
    volumes:
      - upload_data:/data/uploads
      - chroma_data:/data/chroma
    depends_on:
      klarki-chromadb:
        condition: service_healthy
      klarki-ollama:
        condition: service_started
    networks:
      - klarki-net
    restart: unless-stopped

  klarki-chromadb:
    image: chromadb/chroma:latest
    container_name: klarki-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/data   # chromadb/chroma stores data in /data by default
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - PERSIST_DIRECTORY=/data
    healthcheck:
      # chromadb/chroma has no curl/python in PATH — use bash /dev/tcp instead
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - klarki-net
    restart: unless-stopped

  klarki-ollama:
    image: ollama/ollama:latest
    container_name: klarki-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # Limit GPU layers to stay within 4 GB VRAM on RTX 3050 Ti.
      # phi3:mini has 32 layers — offloading 20 to GPU (~1.8 GB), rest on CPU.
      # Increase to 32 if you close other GPU apps and have headroom.
      - OLLAMA_GPU_LAYERS=20
      # Keep only 1 model loaded at a time (memory pressure guard)
      - OLLAMA_MAX_LOADED_MODELS=1
      # Reduce context window — 2048 is enough for compliance chunks
      - OLLAMA_NUM_CTX=2048
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - klarki-net
    restart: unless-stopped

  klarki-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: klarki-frontend
    ports:
      - "80:80"
    depends_on:
      - klarki-api
    networks:
      - klarki-net
    restart: unless-stopped

  klarki-triton:
    build:
      context: .
      dockerfile: Dockerfile.triton
    container_name: klarki-triton
    profiles:
      - triton
    ports:
      - "8002:8000"
      - "8003:8001"
      - "8004:8002"
    volumes:
      - ./model_repository:/models
      - ./training/spacy_ner_model:/spacy_model
    environment:
      - SPACY_MODEL_PATH=/spacy_model/model-final
    command: tritonserver --model-repository=/models --exit-on-error=false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - klarki-net
    restart: unless-stopped

volumes:
  upload_data:
  chroma_data:
  ollama_data:

networks:
  klarki-net:
    driver: bridge
