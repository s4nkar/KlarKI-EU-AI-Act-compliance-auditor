server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # React SPA — all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Allow uploads up to 15 MB (matches API limit of 10 MB + headroom for base64/form overhead)
    client_max_body_size 15M;

    # Use Docker's internal DNS so upstream IP is re-resolved after API restarts.
    resolver 127.0.0.11 valid=15s ipv6=off;

    # Proxy API requests to FastAPI
    location /api/ {
        set $api_upstream http://klarki-api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
